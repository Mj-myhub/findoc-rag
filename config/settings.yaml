# FinDocRAG configuration
# All tunable settings live here. Code reads this file via src/findoc_rag/config.py.

data:
  # Hugging Face dataset id for FinanceBench (the evaluation benchmark).
  # If `make explore` reports the dataset cannot be found, search
  # https://huggingface.co/datasets for "financebench", then correct the id below.
  financebench_dataset_id: "PatronusAI/financebench"
  financebench_split: "train"
  raw_dir: "data/raw"
  processed_dir: "data/processed"

# --- Settings used from Phase 2 onward ---

chunking:
  chunk_size: 800        # characters per chunk
  chunk_overlap: 100     # overlap between consecutive chunks

retrieval:
  top_k: 10              # candidates from each index before fusion
  dense_model: "BAAI/bge-small-en-v1.5"
  rerank_model: "BAAI/bge-reranker-base"
  rerank_top_k: 5        # chunks kept after reranking
  rrf_k: 60              # Reciprocal Rank Fusion constant

generation:
  provider: "groq"
  model: "llama-3.1-8b-instant"
  temperature: 0.0
  max_tokens: 512
